<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- Crucial for proper scaling on iPhone and mobile browsers -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Synced Lyrics Player</title>

<!-- Preload default Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@700&family=Inter:wght@400;700&family=Lobster&family=Montserrat:wght@400;700&family=Pacifico&family=Playfair+Display:wght@700&family=Poppins:wght@400;700&family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #111111;
    --bg-image: none;
    --btn-bg: #4CAF50;
    --btn-color: #ffffff;
    --lyric-active-color: #1db954;
    --lyric-inactive-color: #ffffff;
    --lyric-active-opacity: 1;
    --lyric-inactive-opacity: 0.35;
    --lyric-font-family: 'Poppins', sans-serif;
    --lyric-font-size: 24px;
    --lyric-font-weight: 700;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    height: 100dvh; /* Mobile viewport fix */
    background-color: var(--bg-color);
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.container {
    width: 850px;
    max-width: 92%;
    padding: 25px;
    border-radius: 25px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(20px);
    text-align: center;
    position: relative;
    max-height: 92vh;
    max-height: 92dvh;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
}

.top-actions {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 8px;
    z-index: 10;
}

.top-actions button {
    padding: 6px 12px;
    font-size: 13px;
    margin-bottom: 0;
}

h1 { 
    margin-top: 0;
    font-size: 1.5rem;
}

.input-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: all 0.3s ease;
}

input[type="file"], textarea, input[type="text"], select {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 14px;
}

select option {
    background: #222;
    color: white;
}

textarea {
    height: 90px;
    resize: vertical;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-size: 15px;
    margin-bottom: 10px;
    background-color: var(--btn-bg);
    color: var(--btn-color);
    transition: filter 0.2s ease;
}

button:hover {
    filter: brightness(1.1);
}

audio { 
    width: 100%; 
    margin-top: 10px;
}

.lyrics {
    margin-top: 15px;
    height: 250px;
    overflow-y: auto;
    position: relative;
    scroll-behavior: smooth;
    padding: 100px 0;
    flex-grow: 1;
}

.lyrics::-webkit-scrollbar { display: none; }
.lyrics { -ms-overflow-style: none; scrollbar-width: none; }

.line {
    font-family: var(--lyric-font-family);
    font-size: var(--lyric-font-size);
    margin: 20px 0;
    opacity: var(--lyric-inactive-opacity);
    color: var(--lyric-inactive-color);
    transform: scale(0.9);
    transition: opacity .35s ease, transform .35s ease, color .35s ease;
    cursor: pointer;
    user-select: none;
    word-wrap: break-word;
}

.line:hover {
    opacity: 0.8;
}

.line.active {
    opacity: var(--lyric-active-opacity);
    transform: scale(1.1);
    color: var(--lyric-active-color);
    font-weight: var(--lyric-font-weight);
}

.line.previous {
    opacity: var(--lyric-inactive-opacity);
}

/* MAXIMIZED VIEW STYLES */
.container.maximized {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: 100%;
    max-height: 100vh;
    max-height: 100dvh;
    border-radius: 0;
    padding: 15px;
}

.container.maximized .input-section,
.container.maximized h1 {
    display: none;
}

.container.maximized .lyrics {
    height: 100%;
}

/* SIDE PANEL (DRAWER) FOR CUSTOMIZATION */
.side-drawer {
    position: fixed;
    top: 0;
    right: -100%;
    width: 320px;
    max-width: 85%;
    height: 100vh;
    height: 100dvh;
    background: rgba(20, 20, 20, 0.95);
    backdrop-filter: blur(15px);
    box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    padding: 20px;
    z-index: 100;
    transition: right 0.3s ease;
    overflow-y: auto;
    text-align: left;
}

.side-drawer.open {
    right: 0;
}

.drawer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.close-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    margin: 0;
}

.settings-grid {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.setting-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 14px;
}

.setting-item input[type="color"] {
    border: none;
    height: 40px;
    width: 100%;
    cursor: pointer;
    background: transparent;
}

.preset-buttons {
    display: flex;
    gap: 10px;
}

.preset-buttons button {
    flex: 1;
    font-size: 12px;
    padding: 8px;
    margin-bottom: 0;
    border-radius: 10px;
}

/* Mobile Responsiveness Rules */
@media (max-width: 600px) {
    .container {
        padding: 20px 15px;
    }
    
    h1 {
        font-size: 1.2rem;
        margin-top: 25px;
    }

    :root {
        --lyric-font-size: 18px; /* Smaller default lyric size for mobile screens */
    }
}
</style>
</head>

<body>

<div class="container" id="playerContainer">
    
    <div class="top-actions">
        <button onclick="toggleMaximize()" id="maxBtn">⛶ Maximize</button>
        <button onclick="toggleSettings()">⚙️ Customization</button>
    </div>

    <h1>🎵 Synced Lyrics Player</h1>

    <div class="input-section" id="inputSection">
        <!-- Explicit file formats allow iOS Chrome / Safari to pick audio files from Files app -->
        <input type="file" id="audioFile" accept="audio/*, .mp3, .m4a, .wav, .aac, .ogg, .flac">
        <textarea id="lyricsInput" placeholder="[00:00:000]Lyric Here&#10;[00:05.500]Next Lyric"></textarea>
        <button onclick="loadLyrics()">Load Lyrics</button>
    </div>

    <div class="lyrics" id="lyrics"></div>

    <audio id="audio" controls></audio>
</div>

<!-- Side Drawer for Customization -->
<div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
        <h3 style="margin:0;">Customization</h3>
        <button class="close-btn" onclick="toggleSettings()">✖</button>
    </div>

    <div class="settings-grid">
        <!-- Preset Management -->
        <div class="setting-item">
            <label>Theme Presets (JSON)</label>
            <div class="preset-buttons">
                <button onclick="exportPreset()">💾 Save Preset</button>
                <button onclick="document.getElementById('presetFileInput').click()">📂 Load Preset</button>
            </div>
            <input type="file" id="presetFileInput" accept=".json" style="display: none;">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 0;">

        <!-- Font Dropdown -->
        <div class="setting-item">
            <label>Font Family</label>
            <select id="fontDropdown">
                <option value="Poppins" selected>Poppins (Modern Sans)</option>
                <option value="Inter">Inter (Clean Sans)</option>
                <option value="Roboto">Roboto (Standard)</option>
                <option value="Montserrat">Montserrat (Geometric)</option>
                <option value="Playfair Display">Playfair Display (Serif)</option>
                <option value="Bebas Neue">Bebas Neue (Display Caps)</option>
                <option value="Pacifico">Pacifico (Handwritten)</option>
                <option value="Lobster">Lobster (Script)</option>
                <option value="Caveat">Caveat (Cursive)</option>
                <option value="Roboto Mono">Roboto Mono (Monospace)</option>
                <option value="CUSTOM">Custom Google Font...</option>
            </select>

            <div id="customFontGroup" style="display: none; margin-top: 8px;">
                <input type="text" id="customFontInput" placeholder="Enter Google Font name...">
                <button onclick="applyCustomFont()" style="width: 100%; margin-top: 5px; padding: 8px;">Apply Custom Font</button>
            </div>
        </div>

        <div class="setting-item">
            <label>Font Size (<span id="fontSizeVal">24px</span>)</label>
            <input type="range" id="fontSizeInput" min="14" max="48" step="1" value="24">
        </div>

        <div class="setting-item">
            <label>Active Font Weight</label>
            <select id="fontWeightInput">
                <option value="400">Normal (400)</option>
                <option value="600">Medium (600)</option>
                <option value="700" selected>Bold (700)</option>
                <option value="900">Black (900)</option>
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 0;">

        <!-- Colors & Opacity -->
        <div class="setting-item">
            <label>Active Lyric Color</label>
            <input type="color" id="activeColorInput" value="#1db954">
        </div>
        <div class="setting-item">
            <label>Active Lyric Opacity</label>
            <input type="range" id="activeOpacityInput" min="0.1" max="1" step="0.05" value="1">
        </div>
        <div class="setting-item">
            <label>Inactive Lyric Color</label>
            <input type="color" id="inactiveColorInput" value="#ffffff">
        </div>
        <div class="setting-item">
            <label>Inactive Lyric Opacity</label>
            <input type="range" id="inactiveOpacityInput" min="0.1" max="1" step="0.05" value="0.35">
        </div>
        <div class="setting-item">
            <label>Button Background</label>
            <input type="color" id="btnBgInput" value="#4CAF50">
        </div>
        <div class="setting-item">
            <label>Button Text Color</label>
            <input type="color" id="btnColorInput" value="#ffffff">
        </div>
        <div class="setting-item">
            <label>Background Color</label>
            <input type="color" id="bgColorInput" value="#111111">
        </div>
        <div class="setting-item">
            <label>Background Image URL</label>
            <input type="text" id="bgImageInput" placeholder="https://example.com/image.jpg">
        </div>
    </div>
</div>

<script>
const audio = document.getElementById("audio");
const lyricsBox = document.getElementById("lyrics");
const root = document.documentElement;

let lyrics = [];
let currentActiveIndex = -1;

// Load Audio File
document.getElementById("audioFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        audio.src = URL.createObjectURL(file);
    }
});

function loadLyrics(){
    lyrics = [];
    const text = document.getElementById("lyricsInput").value;
    const lines = text.split("\n");

    lines.forEach(line => {
        line = line.trim();
        if(!line) return;

        const match = line.match(/^\[(\d+):(\d+)(?:[:\.](\d+))?\](.*)/);

        if(match){
            const minutes = parseInt(match[1], 10);
            const seconds = parseInt(match[2], 10);
            
            let msStr = match[3] || "0";
            if (msStr.length === 2) msStr += "0";
            const milliseconds = parseInt(msStr, 10);

            const totalTime = (minutes * 60) + seconds + (milliseconds / 1000);

            lyrics.push({
                time: totalTime,
                text: match[4].trim()
            });
        }
    });

    lyrics.sort((a,b) => a.time - b.time);
    renderLyrics();
}

function renderLyrics(){
    lyricsBox.innerHTML = "";
    currentActiveIndex = -1;

    if (lyrics.length === 0) {
        lyricsBox.innerHTML = "<div class='line' style='opacity:0.6;'>No valid lyrics found. Please check your timestamp format.</div>";
        return;
    }

    lyrics.forEach((line) => {
        const div = document.createElement("div");
        div.classList.add("line");
        div.textContent = line.text;

        div.addEventListener("click", () => {
            audio.currentTime = line.time;
            if (audio.paused) audio.play();
        });

        lyricsBox.appendChild(div);
    });
}

function updateLyrics(){
    if (lyrics.length === 0) return;

    let currentTime = audio.currentTime;
    let activeIndex = -1;

    for(let i = 0; i < lyrics.length; i++){
        if(currentTime >= lyrics[i].time){
            activeIndex = i;
        } else {
            break;
        }
    }

    if (activeIndex !== currentActiveIndex) {
        currentActiveIndex = activeIndex;
        const elements = lyricsBox.querySelectorAll(".line");

        elements.forEach((element, index) => {
            element.classList.remove("active", "previous");

            if(index === activeIndex){
                element.classList.add("active");
                element.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
            } else if(index < activeIndex){
                element.classList.add("previous");
            }
        });
    }
}

audio.addEventListener("timeupdate", updateLyrics);

// Side Drawer Toggle
function toggleSettings() {
    document.getElementById("sideDrawer").classList.toggle("open");
}

// Maximize View Toggle
function toggleMaximize() {
    const container = document.getElementById("playerContainer");
    const maxBtn = document.getElementById("maxBtn");
    container.classList.toggle("maximized");
    maxBtn.textContent = container.classList.contains("maximized") ? "🗗 Restore" : "⛶ Maximize";
}

// Font Handling
const fontDropdown = document.getElementById("fontDropdown");
const customFontGroup = document.getElementById("customFontGroup");

fontDropdown.addEventListener("change", (e) => {
    const val = e.target.value;
    if (val === "CUSTOM") {
        customFontGroup.style.display = "block";
    } else {
        customFontGroup.style.display = "none";
        root.style.setProperty('--lyric-font-family', `'${val}', sans-serif`);
    }
});

function applyCustomFont() {
    const fontName = document.getElementById("customFontInput").value.trim();
    if (!fontName) return;

    const formattedFontName = fontName.replace(/\s+/g, '+');
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = `https://fonts.googleapis.com/css2?family=${formattedFontName}:wght@400;600;700;900&display=swap`;
    
    link.onload = () => {
        root.style.setProperty('--lyric-font-family', `'${fontName}', sans-serif`);
    };
    document.head.appendChild(link);
}

// Sliders and Inputs Listeners
document.getElementById("fontSizeInput").addEventListener("input", (e) => {
    const val = e.target.value + "px";
    root.style.setProperty('--lyric-font-size', val);
    document.getElementById("fontSizeVal").textContent = val;
});

document.getElementById("fontWeightInput").addEventListener("change", (e) => {
    root.style.setProperty('--lyric-font-weight', e.target.value);
});

document.getElementById("activeColorInput").addEventListener("input", (e) => root.style.setProperty('--lyric-active-color', e.target.value));
document.getElementById("inactiveColorInput").addEventListener("input", (e) => root.style.setProperty('--lyric-inactive-color', e.target.value));
document.getElementById("activeOpacityInput").addEventListener("input", (e) => root.style.setProperty('--lyric-active-opacity', e.target.value));
document.getElementById("inactiveOpacityInput").addEventListener("input", (e) => root.style.setProperty('--lyric-inactive-opacity', e.target.value));
document.getElementById("btnBgInput").addEventListener("input", (e) => root.style.setProperty('--btn-bg', e.target.value));
document.getElementById("btnColorInput").addEventListener("input", (e) => root.style.setProperty('--btn-color', e.target.value));
document.getElementById("bgColorInput").addEventListener("input", (e) => root.style.setProperty('--bg-color', e.target.value));

document.getElementById("bgImageInput").addEventListener("input", (e) => {
    const url = e.target.value.trim();
    root.style.setProperty('--bg-image', url ? `url('${url}')` : 'none');
});

// JSON PRESET EXPORT & IMPORT SYSTEM
function getCurrentPresetData() {
    return {
        fontFamily: fontDropdown.value === "CUSTOM" ? document.getElementById("customFontInput").value : fontDropdown.value,
        isCustomFont: fontDropdown.value === "CUSTOM",
        fontSize: document.getElementById("fontSizeInput").value,
        fontWeight: document.getElementById("fontWeightInput").value,
        activeColor: document.getElementById("activeColorInput").value,
        activeOpacity: document.getElementById("activeOpacityInput").value,
        inactiveColor: document.getElementById("inactiveColorInput").value,
        inactiveOpacity: document.getElementById("inactiveOpacityInput").value,
        btnBg: document.getElementById("btnBgInput").value,
        btnColor: document.getElementById("btnColorInput").value,
        bgColor: document.getElementById("bgColorInput").value,
        bgImage: document.getElementById("bgImageInput").value
    };
}

function exportPreset() {
    const data = getCurrentPresetData();
    const jsonStr = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement("a");
    a.href = url;
    a.download = "lyrics-player-preset.json";
    a.click();
    URL.revokeObjectURL(url);
}

document.getElementById("presetFileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const preset = JSON.parse(event.target.result);
            applyPreset(preset);
        } catch (err) {
            alert("Invalid JSON Preset file!");
        }
    };
    reader.readAsText(file);
});

function applyPreset(p) {
    if (p.fontSize) {
        document.getElementById("fontSizeInput").value = p.fontSize;
        root.style.setProperty('--lyric-font-size', p.fontSize + "px");
        document.getElementById("fontSizeVal").textContent = p.fontSize + "px";
    }
    if (p.fontWeight) {
        document.getElementById("fontWeightInput").value = p.fontWeight;
        root.style.setProperty('--lyric-font-weight', p.fontWeight);
    }
    if (p.activeColor) {
        document.getElementById("activeColorInput").value = p.activeColor;
        root.style.setProperty('--lyric-active-color', p.activeColor);
    }
    if (p.activeOpacity) {
        document.getElementById("activeOpacityInput").value = p.activeOpacity;
        root.style.setProperty('--lyric-active-opacity', p.activeOpacity);
    }
    if (p.inactiveColor) {
        document.getElementById("inactiveColorInput").value = p.inactiveColor;
        root.style.setProperty('--lyric-inactive-color', p.inactiveColor);
    }
    if (p.inactiveOpacity) {
        document.getElementById("inactiveOpacityInput").value = p.inactiveOpacity;
        root.style.setProperty('--lyric-inactive-opacity', p.inactiveOpacity);
    }
    if (p.btnBg) {
        document.getElementById("btnBgInput").value = p.btnBg;
        root.style.setProperty('--btn-bg', p.btnBg);
    }
    if (p.btnColor) {
        document.getElementById("btnColorInput").value = p.btnColor;
        root.style.setProperty('--btn-color', p.btnColor);
    }
    if (p.bgColor) {
        document.getElementById("bgColorInput").value = p.bgColor;
        root.style.setProperty('--bg-color', p.bgColor);
    }
    if (p.bgImage !== undefined) {
        document.getElementById("bgImageInput").value = p.bgImage;
        root.style.setProperty('--bg-image', p.bgImage ? `url('${p.bgImage}')` : 'none');
    }
    if (p.fontFamily) {
        if (p.isCustomFont) {
            fontDropdown.value = "CUSTOM";
            customFontGroup.style.display = "block";
            document.getElementById("customFontInput").value = p.fontFamily;
            applyCustomFont();
        } else {
            fontDropdown.value = p.fontFamily;
            customFontGroup.style.display = "none";
            root.style.setProperty('--lyric-font-family', `'${p.fontFamily}', sans-serif`);
        }
    }
}
</script>

</body>
</html>
